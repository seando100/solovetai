<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoloVetAI — AI-Powered Veterinary Intake</title>
    <meta name="description" content="AI-powered client intake for veterinary practices. Capture new patient leads 24/7 with an AI assistant that guides pet owners through structured intake.">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0F2745;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container {
            max-width: 640px;
            text-align: center;
        }
        .wordmark {
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }
        .accent { color: #10B981; }
        .tagline {
            font-size: 1.125rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 32px;
        }
        .badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10B981;
            font-size: 0.875rem;
            font-weight: 600;
            padding: 6px 20px;
            border-radius: 100px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }
        .description {
            font-size: 1.0625rem;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 48px;
        }
        .parent {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.4);
        }
        .parent a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            transition: color 0.2s, border-color 0.2s;
        }
        .parent a:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="wordmark">Solo<span class="accent">Vet</span>AI</h1>
        <p class="tagline">AI-Powered Client Intake for Veterinary Practices</p>
        <div class="badge">Coming Soon</div>
        <p class="description">Capture new patient leads 24/7. An AI assistant on your website guides pet owners through structured intake — collecting pet info, symptoms, and contact details before they ever call.</p>
        <p class="parent">A <a href="https://www.solosolutionsai.com">SoloSolutionsAI</a> Product</p>
    </div>
</body>
</html>
